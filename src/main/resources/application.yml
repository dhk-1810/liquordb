logging:
  level:
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

jwt:
  secret: ${JWT_SECRET_KEY}
  issuer: ${JWT_ISSUER}
  access-token-validity-in-ms: ${JWT_ACCESS_TOKEN_VALIDITY}
  refresh-token-validity-in-ms: ${JWT_REFRESH_TOKEN_VALIDITY}